services:
  - type: web
    name: vigil-api
    env: python
    buildCommand: >-
      pip install uv &&
      uv sync &&
      python -c "
      import os;
      os.environ['SENTENCE_TRANSFORMERS_HOME']='/tmp/st_cache';
      from sentence_transformers import SentenceTransformer;
      SentenceTransformer('all-MiniLM-L6-v2')
      "
    startCommand: >-
      uv run uvicorn api.main:app
      --host 0.0.0.0
      --port $PORT
      --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: SENTENCE_TRANSFORMERS_HOME
        value: /tmp/st_cache
      - key: REVALIDATE_SECRET
        value: vigil-revalidate-2026
      - key: ENABLE_SEMANTIC_SCORING
        value: "false"
