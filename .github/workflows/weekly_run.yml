name: Weekly Drift Monitor Run

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  run-drift-monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install dependencies
        run: uv sync
        
      - name: Run drift monitor suite
        run: uv run python -m harness.runner --model gemini/gemini-1.5-flash
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          NEXTJS_URL: ${{ secrets.NEXTJS_URL }}
          API_URL: ${{ secrets.API_URL }}
          
      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/drift_monitor.db
          git diff --staged --quiet || git commit -m "chore: update drift data [skip ci]"
          git push
          
      - name: Upload SQLite DB
        uses: actions/upload-artifact@v4
        with:
          name: drift-monitor-db
          path: data/drift_monitor.db
          retention-days: 90
